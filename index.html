<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 天机系统 v3.0</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --dim: #8b949e; --green: #3fb950;
  --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:16px; max-width:900px; margin:0 auto; }
h1 { font-size:1.5em; margin-bottom:4px; }
.subtitle { color:var(--dim); font-size:0.85em; margin-bottom:16px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
@media(max-width:600px) { .grid { grid-template-columns:1fr; } }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; }
.card h2 { font-size:1em; color:var(--dim); margin-bottom:8px; }
.big { font-size:2em; font-weight:bold; }
.long { color:var(--green); }
.short { color:var(--red); }
.neutral { color:var(--yellow); }
.layer { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
.layer:last-child { border-bottom:none; }
.layer-name { color:var(--dim); }
.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.8em; font-weight:600; }
.tag-long { background:#1a3a1a; color:var(--green); }
.tag-short { background:#3a1a1a; color:var(--red); }
.tag-neutral { background:#2a2a1a; color:var(--yellow); }
.history-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.9em; }
.accuracy-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:4px; }
.accuracy-fill { height:100%; border-radius:4px; }
.footer { text-align:center; color:var(--dim); font-size:0.75em; margin-top:24px; padding:16px 0; border-top:1px solid var(--border); }
#loading { text-align:center; padding:40px; color:var(--dim); }
#error { text-align:center; padding:20px; color:var(--red); display:none; }
</style>
</head>
<body>
<h1>🦞 天机系统 v3.0</h1>
<div class="subtitle">实事求是 · 更快更强更稳更准</div>

<div id="loading">⏳ 加载数据...</div>
<div id="error">❌ 数据加载失败</div>

<div id="dashboard" style="display:none">
  <div class="grid">
    <div class="card">
      <h2>📊 融合信号</h2>
      <div id="signal-direction" class="big neutral">—</div>
      <div id="signal-detail" style="color:var(--dim);font-size:0.85em;margin-top:4px">—</div>
    </div>
    <div class="card">
      <h2>💰 BTC价格</h2>
      <div id="btc-price" class="big">—</div>
      <div id="btc-time" style="color:var(--dim);font-size:0.85em;margin-top:4px">—</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <h2>🔬 4层信号</h2>
    <div id="layers"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>🎯 准确率</h2>
      <div id="accuracy" class="big">—</div>
      <div class="accuracy-bar"><div id="accuracy-bar" class="accuracy-fill" style="width:0%;background:var(--yellow)"></div></div>
      <div id="accuracy-detail" style="color:var(--dim);font-size:0.8em;margin-top:4px">等待数据积累...</div>
    </div>
    <div class="card">
      <h2>🌍 地缘风险</h2>
      <div id="geo-score" class="big">—</div>
      <div id="geo-detail" style="color:var(--dim);font-size:0.85em;margin-top:4px">—</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <h2>📈 信号历史 (最近10条)</h2>
    <div id="history"></div>
  </div>
</div>

<div class="footer">
  天机小队 · 天枢(2号)编排 · 天眼(3号)盯盘 · 天影(4号)情报<br>
  数据每30分钟自动更新 · <span id="update-time">—</span>
</div>

<script>
const DATA_URL = 'data.json';

function dirClass(d) {
  return d === 'LONG' ? 'long' : d === 'SHORT' ? 'short' : 'neutral';
}
function tagHTML(d) {
  const cls = d === 'LONG' ? 'tag-long' : d === 'SHORT' ? 'tag-short' : 'tag-neutral';
  return `<span class="tag ${cls}">${d}</span>`;
}
const layerNames = {
  A_price_state: 'A 价格状态',
  B_chain_flow: 'B 链上流动',
  C_geo_risk: 'C 地缘风险',
  D_early_warning: 'D 预警系统'
};

async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const d = await r.json();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    // 信号
    const sig = d.signal || {};
    const dir = sig.direction || 'NEUTRAL';
    document.getElementById('signal-direction').className = `big ${dirClass(dir)}`;
    document.getElementById('signal-direction').textContent = `${dir} ${(sig.confidence||0).toFixed(1)}%`;
    document.getElementById('signal-detail').textContent = `一致性 ${sig.agreement||'?'}% · 综合分 ${(sig.score||0).toFixed(1)}`;
    
    // BTC
    document.getElementById('btc-price').textContent = `$${(sig.price||0).toLocaleString()}`;
    document.getElementById('btc-time').textContent = d.updated || '—';
    document.getElementById('update-time').textContent = d.updated || '—';
    
    // 层级
    const layersEl = document.getElementById('layers');
    layersEl.innerHTML = '';
    for (const [k,v] of Object.entries(d.layers || {})) {
      layersEl.innerHTML += `<div class="layer">
        <span class="layer-name">${layerNames[k]||k}</span>
        <span>${tagHTML(v.direction)} <span style="color:var(--dim);font-size:0.85em">${(v.confidence||0).toFixed(0)}%</span></span>
      </div>`;
    }
    
    // 准确率
    const acc = d.accuracy || {};
    if (acc.total > 0) {
      const pct = (acc.correct / acc.total * 100);
      document.getElementById('accuracy').textContent = `${pct.toFixed(1)}%`;
      document.getElementById('accuracy-bar').style.width = `${pct}%`;
      document.getElementById('accuracy-bar').style.background = pct >= 55 ? 'var(--green)' : pct >= 45 ? 'var(--yellow)' : 'var(--red)';
      document.getElementById('accuracy-detail').textContent = `${acc.correct}/${acc.total} 正确 (4h验证)`;
    }
    
    // 地缘
    const geo = d.geo || {};
    document.getElementById('geo-score').textContent = `${(geo.composite||0).toFixed(0)}/100`;
    document.getElementById('geo-score').className = `big ${(geo.composite||0) >= 55 ? 'short' : (geo.composite||0) >= 40 ? 'neutral' : 'long'}`;
    document.getElementById('geo-detail').textContent = `军事 ${geo.military||'?'} · ${geo.recommendation||'—'}`;
    
    // 历史
    const histEl = document.getElementById('history');
    histEl.innerHTML = '';
    for (const h of (d.history || []).slice(-10).reverse()) {
      histEl.innerHTML += `<div class="history-item">
        <span style="color:var(--dim)">${(h.ts||'').slice(11,16)}</span>
        ${tagHTML(h.direction)}
        <span>${(h.confidence||0).toFixed(1)}%</span>
        <span style="color:var(--dim)">$${(h.price||0).toLocaleString()}</span>
      </div>`;
    }
    
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    console.error(e);
  }
}

load();
setInterval(load, 60000); // 每分钟刷新
</script>
</body>
</html>
